<!doctype html>
<html>
<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EAT BEER Pac-Man Demo</title>
  <style>
    body { margin: 0; background: #000; font-family: Arial, sans-serif; text-align: center; height: 100vh; overflow: hidden; }

    /* ── Responsives Scaling ─────────────────────────────────── */
    @media (max-width: 620px) {
      #lga { transform-origin: top center; transform: scale(0.6); }
    }

    /* ── Popup Overlay ───────────────────────────────────────── */
    #eb-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      align-items: center; justify-content: center;
      animation: ebFadeIn 0.3s ease;
    }
    #eb-overlay.active { display: flex; }
    @keyframes ebFadeIn { from { opacity: 0; } to { opacity: 1; } }

    #eb-popup {
      background: #111;
      border: 2px solid #e8960f;
      border-radius: 14px;
      padding: 32px 36px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      color: #fff;
      box-shadow: 0 0 40px rgba(232, 150, 15, 0.3);
      animation: ebSlideIn 0.32s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes ebSlideIn {
      from { transform: translateY(-24px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    #eb-popup-icon { font-size: 52px; margin-bottom: 10px; }
    #eb-popup h2 {
      color: #e8960f; margin: 0 0 10px; font-size: 19px; line-height: 1.3;
    }
    #eb-popup-animation {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 22px; margin: 10px 0 6px;
    }
    .eb-anim-arrow {
      color: #e8960f; font-size: 20px;
      animation: ebArrow 0.9s ease-in-out infinite alternate;
    }
    @keyframes ebArrow {
      from { transform: translateX(-4px); }
      to   { transform: translateX(4px); }
    }
    .eb-anim-target {
      animation: ebPulse 1.6s ease-in-out infinite;
    }
    @keyframes ebPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.18); }
    }
    #eb-popup-text {
      color: #ccc; line-height: 1.55; font-size: 14px;
      margin: 10px 0 22px;
    }
    #eb-popup-btn {
      background: #e8960f; color: #000; border: none;
      padding: 11px 30px; border-radius: 7px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      transition: background 0.15s;
    }
    #eb-popup-btn:hover { background: #ffb230; }

    /* ── START-Button ────────────────────────────────────────── */
    #eb-start-btn {
      position: absolute; top: 60%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px; padding: 18px 56px;
      background: linear-gradient(135deg, #e8960f 0%, #c97008 100%);
      color: #fff;
      border: 2px solid rgba(255, 210, 80, 0.55);
      cursor: pointer; font-weight: bold;
      border-radius: 50px;
      letter-spacing: 5px;
      text-transform: uppercase;
      box-shadow: 0 0 28px rgba(232, 150, 15, 0.75), 0 4px 18px rgba(0,0,0,0.45);
      animation: ebBtnBlink 1.8s ease-in-out infinite;
    }
    #eb-start-btn:hover {
      animation: none; opacity: 1;
      background: linear-gradient(135deg, #ffb230 0%, #e8960f 100%);
      box-shadow: 0 0 48px rgba(232, 150, 15, 1), 0 4px 24px rgba(0,0,0,0.45);
    }
    @keyframes ebBtnBlink {
      0%   { opacity: 1; }
      40%  { opacity: 1; }
      55%  { opacity: 0; }
      90%  { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ── Sprachauswahl-Overlay ──────────────────────────────── */
    #eb-lang-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 10000;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
    }
    #eb-lang-overlay.active { display: flex; }
    #eb-lang-disclaimer {
      color: #ccc; font-size: 0.88em; font-style: italic;
      text-align: center; max-width: 420px;
      transition: opacity 0.2s;
    }
    #eb-lang-disclaimer strong { font-style: normal; color: #fff; }
    #eb-lang-box {
      background: #1a1a1a;
      border: 2px solid #e8960f;
      border-radius: 12px;
      padding: 40px 48px;
      text-align: center;
      animation: ebFadeIn 0.3s ease, ebSlideIn 0.32s cubic-bezier(.22,.68,0,1.2);
    }
    #eb-lang-title {
      font-size: 1.6em; font-weight: bold;
      color: #e8960f; margin-bottom: 12px;
    }
    #eb-lang-subtitle {
      color: #aaa; font-size: 0.95em; margin-bottom: 28px; line-height: 1.6;
    }
    #eb-lang-buttons { display: flex; gap: 16px; justify-content: center; }
    .eb-lang-btn {
      font-size: 1.1em; padding: 12px 28px;
      border: 2px solid #e8960f;
      background: transparent; color: #e8960f;
      border-radius: 8px; cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .eb-lang-btn:hover { background: #e8960f; color: #000; }
    #eb-lang-quote {
      text-align: center; max-width: 380px;
      transition: opacity 0.2s;
    }
    #eb-lang-quote-text {
      display: block;
      color: #ccc; font-size: 0.92em; font-style: italic; line-height: 1.6;
      margin-bottom: 14px;
    }
    #eb-lang-quote-text strong { color: #fff; font-style: normal; }
    #eb-lang-logo {
      display: inline-flex; align-items: center; gap: 8px;
      color: #e8960f; font-size: 0.78em; font-weight: bold;
      letter-spacing: 1px; text-transform: uppercase;
    }
    #eb-lang-logo-icon {
      font-size: 1.4em; line-height: 1;
    }
    #eb-lang-logo-text { line-height: 1.2; text-align: left; }
    #eb-lang-logo-sub {
      display: block; font-size: 0.75em;
      color: #aaa; font-weight: normal; letter-spacing: 2px;
    }
  </style>

  <script>
    window.google = {
      time: function () { return (new Date).getTime() },
      Toolbelt: {},
      y: {},
      dom: {
        append: function (el) { document.body.appendChild(el); },
        remove: function (el) { if (el && el.parentNode) el.parentNode.removeChild(el); }
      },
      browser: { engine: { IE: false } }
    }
  </script>
</head>
<body>
  <div id="logo" style="position: relative; width: 100%; height: 100vh; background-image: url('eatbeer-bg-final-retro.png'); background-size: contain; background-position: center; background-repeat: no-repeat;">
    <script>
      google.pml = function () {
        function d(a) {
          if (!google.pml_installed) {
            google.pml_installed = true;
            if (!a) {
              document.getElementById("logo").style.background = "none";
              window.setTimeout(function () {
                var b = document.getElementById("logo-l");
                if (b) b.style.display = "block"
              }, 400)
            }
            var audio = document.createElement("script");
            audio.type = "text/javascript";
            audio.src = "pacman-audio.js";
            audio.onload = function () {
              var s = document.createElement("script");
              s.type = "text/javascript";
              s.src = "pacman.js";
              s.onload = function () {
                var ext = document.createElement("script");
                ext.type = "text/javascript";
                ext.src = "eatbeer-extensions.js";
                document.body.appendChild(ext);
              };
              google.dom.append(s)
            };
            google.dom.append(audio)
          }
        }
        if (!google.pml_loaded) {
          google.pml_loaded = true;
          window.setTimeout(function () { d(true) }, 1000);
          google.rein && google.rein.forEach && google.rein.forEach(function(f){f()});
          google.dstr && google.dstr.push(function () {
            google.pacman && google.pacman.destroy();
          });
        }
      };
    </script>

    <!-- START DEMO Button – absolut positioniert zwischen EAT BEER und Pacman -->
    <input id="eb-start-btn" name="btnI" type="button" value="▶  START"
           onclick="ebStartGame()">
  </div>

  <!-- ── Sprachauswahl-Overlay ────────────────────────────── -->
  <div id="eb-lang-overlay" class="active">
    <div id="eb-lang-disclaimer">
      <strong>Disclaimer:</strong> <span id="eb-disclaimer-text">This game shows how breweries can move beyond survival mode.</span>
    </div>
    <div id="eb-lang-box">
      <div id="eb-lang-title">🍺 EAT BEER Pac-Man</div>
      <div id="eb-lang-subtitle">Bitte wähle deine Sprache<br>Please select your language</div>
      <div id="eb-lang-buttons">
        <button class="eb-lang-btn" id="eb-btn-de" onclick="ebSelectLanguage('de')">🇩🇪 Deutsch</button>
        <button class="eb-lang-btn" onclick="ebSelectLanguage('en')">🇬🇧 English</button>
      </div>
    </div>
    <div id="eb-lang-quote">
      <span id="eb-lang-quote-text">"Every brewery has <strong>hidden losses</strong>. Find them. Turn them into value."</span>
      <div id="eb-lang-logo">
        <span id="eb-lang-logo-icon">🍺</span>
        <span id="eb-lang-logo-text">EAT BEER<span id="eb-lang-logo-sub">BIOTECH</span></span>
      </div>
    </div>
  </div>

  <!-- ── Popup-Overlay ──────────────────────────────────────── -->
  <div id="eb-overlay">
    <div id="eb-popup">
      <div id="eb-popup-icon"></div>
      <h2 id="eb-popup-title"></h2>
      <div id="eb-popup-animation"></div>
      <p id="eb-popup-text"></p>
      <button class="eb-btn" id="eb-popup-btn" onclick="ebClosePopup()">Weiter &#8594;</button>
    </div>
  </div>

  <script>
    function ebStartGame() {
      google.pacManSound = true;   // Muss VOR insertCoin() gesetzt werden
      document.getElementById("logo").style.backgroundImage = "url('eatbeer-bg-retro-2.png')";
      document.getElementById("eb-start-btn").style.display = "none";
      if (typeof google.pacman !== 'undefined' && google.pacman.insertCoin) {
        google.pacman.insertCoin();
      } else {
        google.pml && google.pml();
      }
    }

    function ebSelectLanguage(lang) {
      window.ebLanguage = lang;
      document.getElementById('eb-lang-overlay').classList.remove('active');
      var btn = document.getElementById('eb-popup-btn');
      btn.innerHTML = lang === 'de' ? 'Weiter &#8594;' : 'Continue &#8594;';
    }

    var EB_LANG_TEXTS = {
      en: {
        disclaimer: 'This game shows how breweries can move beyond survival mode.',
        quote: '"Every brewery has <strong>hidden losses</strong>. Find them. Turn them into value."'
      },
      de: {
        disclaimer: 'Dieses Spiel zeigt, wie Brauereien über den Survival Modus hinauswachsen können.',
        quote: '„Jede Brauerei hat <strong>verborgene Verluste</strong>. Finde sie. Mach sie zu wertschöpfenden Nebenströmen!"'
      }
    };

    function ebSetLangTexts(lang) {
      document.getElementById('eb-disclaimer-text').innerHTML = EB_LANG_TEXTS[lang].disclaimer;
      document.getElementById('eb-lang-quote-text').innerHTML = EB_LANG_TEXTS[lang].quote;
    }

    (function () {
      var btnDe = document.getElementById('eb-btn-de');
      btnDe.addEventListener('mouseenter', function () { ebSetLangTexts('de'); });
      btnDe.addEventListener('mouseleave', function () { ebSetLangTexts('en'); });
    })();

    function ebClosePopup() {
      document.getElementById('eb-overlay').classList.remove('active');
      if (window.ebResumeCallback) {
        var fn = window.ebResumeCallback;
        window.ebResumeCallback = null;
        fn();
      }
    }

    /* Enter-Taste schließt Popup */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        var popup = document.getElementById('eb-overlay');
        if (popup && popup.classList.contains('active')) {
          ebClosePopup();
        }
      }
    });

    // ── Background frame positioning ─────────────────────────────
    var EB_IMG_W = 1248, EB_IMG_H = 832;
    // Dark frame bounds as fractions of image size — adjust if game drifts off-center
    var EB_FRAME = { left: 0.088, top: 0.168, right: 0.913, bottom: 0.787 };

    function ebPositionGameCanvas() {
      var canvas = document.getElementById('pcm-c');
      if (!canvas) return;
      var vw = window.innerWidth, vh = window.innerHeight;
      var imgAspect = EB_IMG_W / EB_IMG_H;
      var vpAspect  = vw / vh;
      var imgW, imgH, imgX, imgY;
      if (vpAspect > imgAspect) {           // wider viewport → pillarbox
        imgH = vh;  imgW = vh * imgAspect;
        imgX = (vw - imgW) / 2;  imgY = 0;
      } else {                              // taller viewport → letterbox
        imgW = vw;  imgH = vw / imgAspect;
        imgX = 0;   imgY = (vh - imgH) / 2;
      }
      var frameX = imgX + imgW * EB_FRAME.left;
      var frameY = imgY + imgH * EB_FRAME.top;
      var frameW = imgW * (EB_FRAME.right  - EB_FRAME.left);
      var frameH = imgH * (EB_FRAME.bottom - EB_FRAME.top);
      var nativeW = 554, nativeH = 186;
      var scale = Math.min(frameW / nativeW, frameH / nativeH);
      canvas.style.position        = 'absolute';
      canvas.style.left            = Math.round(frameX + (frameW - nativeW * scale) / 2) + 'px';
      canvas.style.top             = Math.round(frameY + (frameH - nativeH * scale) / 2) + 'px';
      canvas.style.transformOrigin = '0 0';
      canvas.style.transform       = 'scale(' + scale + ')';
    }

    window.addEventListener('resize', ebPositionGameCanvas);

    // Fire once when #pcm-c appears in the DOM (created by pacman.js on game init)
    var _ebObserver = new MutationObserver(function () {
      if (document.getElementById('pcm-c')) {
        ebPositionGameCanvas();
        _ebObserver.disconnect();
      }
    });
    _ebObserver.observe(document.getElementById('logo'), { childList: true, subtree: true });

    google.dstr = [];
    google.rein = [];
    window.setTimeout(function () {
      google.pml && google.pml();
    }, 0);
  </script>
</body>
</html>
